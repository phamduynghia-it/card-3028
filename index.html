<!DOCTYPE html>
<html lang="en" class="dark">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>love you</title>
        <link
            href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./static/css/app.css" />
    </head>
    <body class="font-sans antialiased">

        <div
            id="app"
            data-page='{
        "component": "views/home",
        "props": {
          "errors": {},
          "name": "Github NguyenQuocViet",
          "quote": {
            "message": "",
            "author": ""
          },
          "auth": {
            "user": null
          },
          "ziggy": {
            "port": null,
            "defaults": [],
            "routes": {
              "home": {
                "uri": "/",
                "methods": ["GET", "HEAD"]
              },
              "show-create-form": {
                "uri": "create-message/{id?}",
                "methods": ["GET", "HEAD"],
                "parameters": ["id"]
              },
              "create-form": {
                "uri": "create-message",
                "methods": ["POST"]
              },
              "login": {
                "uri": "login",
                "methods": ["GET", "HEAD"]
              },
              "logout": {
                "uri": "logout",
                "methods": ["POST"]
              },
              "storage.local": {
                "uri": "storage/{path}",
                "methods": ["GET", "HEAD"],
                "wheres": {
                  "path": ".*"
                },
                "parameters": ["path"]
              }
            },
            "location": ""
          },
          "message": "",
          "client": {
            "fontName": "Mali",
            "color": "#ee66a6",
            "messages": ["06.08","365 day of us","My love","One year anniversary","Cảm ơn chị đã luôn bên em"],
            "speed": 7,
            "music": "./assets/user_bg_music.mp3"
          },
          "clientId": "/"
        },
        "url": "/",
        "version": "",
        "clearHistory": false,
        "encryptHistory": false
      }
      '
        ></div>
        <script>
          const appDiv = document.getElementById('app');
          if (appDiv) {
            const pageData = JSON.parse(appDiv.getAttribute('data-page'));
            pageData.url = window.location.pathname + window.location.search;
            appDiv.setAttribute('data-page', JSON.stringify(pageData));
          }
        </script>
        <script type="module" src="./static/js/app.js"></script>
        <script type="module" src="./static/js/home.js"></script>
    </body>
</html>
